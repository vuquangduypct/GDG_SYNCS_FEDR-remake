<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TaskFlow – Tasks</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Menu</div>
      <a href="index" class="nav-item">
        <span class="nav-icon">🏠</span> Dashboard
      </a>
      <a href="tasks" class="nav-item active">
        <span class="nav-icon">✅</span> Tasks
        <span class="nav-badge" id="sidebar-task-count">0</span>
      </a>
      <a href="archive" class="nav-item">
        <span class="nav-icon">📦</span> Archive
      </a>
      <a href="settings" class="nav-item">
        <span class="nav-icon">⚙️</span> Settings
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">JD</div>
        <div class="user-info">
          <div class="user-name">Jamie Doe</div>
          <div class="user-role">Developer</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="content">
    <header class="topbar">
      <h1 class="topbar-title">Task Board</h1>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-new-task">+ New Task</button>
      </div>
    </header>

    <main class="page-body" id="task-board">
      <div class="tasks-controls">
        <input type="text" id="task-search" class="search-box" placeholder="Search tasks…" />
        <div class="filter-group">
          <button class="filter-pill active" data-filter="all">All</button>
          <button class="filter-pill" data-filter="pending">Pending</button>
          <button class="filter-pill" data-filter="done">Done</button>
        </div>
      </div>

      <div class="board">
        <div>
          <div class="col-header">
            <div class="col-header-left"><span class="col-dot high"></span> High Priority</div>
            <span class="col-count" data-col-count="high">0</span>
          </div>
          <div class="col-body" id="col-high"></div>
        </div>
        <div>
          <div class="col-header">
            <div class="col-header-left"><span class="col-dot medium"></span> Medium Priority</div>
            <span class="col-count" data-col-count="medium">0</span>
          </div>
          <div class="col-body" id="col-medium"></div>
        </div>
        <div>
          <div class="col-header">
            <div class="col-header-left"><span class="col-dot low"></span> Low Priority</div>
            <span class="col-count" data-col-count="low">0</span>
          </div>
          <div class="col-body" id="col-low"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="overlay" id="task-overlay"></div>
<div class="modal" id="task-modal">
  <div class="modal-header">
    <h2 class="modal-title">New Task</h2>
    <button class="modal-close" id="modal-cancel">✕</button>
  </div>
  <div class="form-group">
    <label class="form-label">Title <span class="req">*</span></label>
    <input type="text" id="f-title" class="form-control" placeholder="What needs to be done?" />
  </div>
  <div class="form-group">
    <label class="form-label">Description</label>
    <textarea id="f-desc" class="form-control" placeholder="Optional details…"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">Priority <span class="req">*</span></label>
    <select id="f-priority" class="form-control">
      <option value="">— Select priority —</option>
      <option value="high">🔴 High</option>
      <option value="medium">🟡 Medium</option>
      <option value="low">🟢 Low</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">Due Date</label>
    <input type="date" id="f-date" class="form-control" />
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="modal-cancel-2">Cancel</button>
    <button class="btn btn-primary" id="save-task">Add Task</button>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/ui.js"></script>
<script>
  const count = loadTasks().filter(t => !t.archived && !t.done).length;
  const badge = document.getElementById('sidebar-task-count');
  if (badge) badge.textContent = count;
</script>
</body>
</html>
